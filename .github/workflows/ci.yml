name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Swift Test
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build example app
        run: |
          xcodebuild \
            -project Examples/YashimaPreviewLab/YashimaPreviewLab.xcodeproj \
            -scheme YashimaPreviewLab \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath /tmp/YashimaPreviewLabDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
